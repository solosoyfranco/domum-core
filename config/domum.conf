# domum-core configuration
# This file is sourced by bash. Keep it simple.

# Your base domain
DOMUM_DOMAIN="ladomum.com"

# ACME email for certificates
DOMUM_EMAIL="jfranco.lopez@outlook.com"

# Optional: helpful for documentation, not required
DOMUM_LAN_IP="10.0.10.2"
DOMUM_TS_IP=""

# Enable core proxy
ENABLE_TRAEFIK=1

# Automation stack
ENABLE_HOME_ASSISTANT=1
ENABLE_MARIADB=1
ENABLE_MQTT=0
ENABLE_ZIGBEE2MQTT=0
HAS_ZIGBEE_DONGLE=0
ENABLE_NODERED=0
ENABLE_ESP_HOME=0

# Monitoring
ENABLE_UPTIME_KUMA=1
ENABLE_PORTAINER=1

# Media
ENABLE_JELLYFIN=0

# Networking
ENABLE_ADGUARD_HOME=0

# Security
ENABLE_TAILSCALE=0

# Profiles
# core is always enabled
ENABLE_NIGHT_PROFILE=1
ENABLE_MEDIA_PROFILE=0
ENABLE_AI_PROFILE=0

# Night schedule (systemd timers)
NIGHT_UP_TIME="23:00"
NIGHT_DOWN_TIME="07:00"

# If enabled, domum apply will stop night-only containers when outside the window.
# Scheduling is still handled by systemd timers.
NIGHT_AUTOSTOP_OUTSIDE_WINDOW=1
