homeassistant:
  name: Domum
  time_zone: America/New_York

default_config:

# This is REQUIRED when HA is behind a reverse proxy that sets X-Forwarded-For / Proto
http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.16.0.0/12
    - 10.0.0.0/8
    - 192.168.0.0/16

logger:
  default: info
