homeassistant:
  name: Domum-Home
  time_zone: America/New_York
  unit_system: imperial
  currency: USD
  external_url: !secret external_url
  internal_url: !secret internal_url
  packages: !include_dir_named packages

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.16.0.0/12
    - 127.0.0.1
    - ::1
