# Home Assistant Core Configuration
homeassistant:
  name: Home
  latitude: !secret latitude
  longitude: !secret longitude
  elevation: !secret elevation
  unit_system: imperial
  time_zone: America/New_York
  currency: USD
  external_url: !secret external_url
  internal_url: !secret internal_url
  allowlist_external_dirs:
    - /tmp
    - /config/www
  media_dirs:
    media: /media
  auth_providers:
    - type: homeassistant
    - type: trusted_networks

# HTTP Component with proxy settings
http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 127.0.0.1
    - ::1
    - 172.16.0.0/12   # Docker internal network
    - 192.168.0.0/16  # Your local network
    - 10.0.0.0/8
  ip_ban_enabled: true
  login_attempts_threshold: 5

# Default Components
frontend:
  themes: !include_dir_merge_named themes

config:

lovelace:
  mode: yaml
  resources:
    - url: /hacsfiles/hass-hue-icons/hass-hue-icons.js
      type: module

# Include files
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# Core integrations
api:
  encryption:
    enabled: true

default_config:

# Discovery
discovery:

# System health
system_health:

# Network
network:
  allowlist:
    - 127.0.0.1
    - ::1

# Cloud
cloud:

