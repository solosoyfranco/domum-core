automation:
  - id: "domum_daily_ping"
    alias: "Daily: notify if HA restarted"
    trigger:
      - platform: homeassistant
        event: start
    action:
      - service: logbook.log
        data:
          name: "Domum"
          message: "Home Assistant started"

  - id: "domum_guest_mode_night"
    alias: "Guest Mode: enable at night"
    trigger:
      - platform: time
        at: "22:30:00"
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.guest_mode
