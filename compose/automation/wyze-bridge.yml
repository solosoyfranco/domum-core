services:
  wyze-bridge:
    image: mrlt8/wyze-bridge:latest
    container_name: wyze-bridge
    restart: unless-stopped

    networks:
      - domum-proxy
      - domum-internal

    ports:
      - "5000:5000"
      - "8554:8554"
      - "8888:8888"

    labels:
      - traefik.enable=true
      - traefik.docker.network=domum-proxy
      - traefik.http.routers.wyze.rule=Host(`wyze.${DOMUM_DOMAIN}`)
      - traefik.http.routers.wyze.entrypoints=websecure
      - traefik.http.routers.wyze.tls=true
      - traefik.http.routers.wyze.tls.certresolver=cf
      - traefik.http.services.wyze.loadbalancer.server.port=5000

    environment:
      - WB_AUTH=false

networks:
  domum-proxy:
    external: true
  domum-internal:
    name: domum-internal
    driver: bridge

