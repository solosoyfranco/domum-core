services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    networks:
      - domum-proxy
      - domum-data
    privileged: true
    environment:
      - TZ=America/New_York
    volumes:
      - /opt/domum-core/compose/automation/home-assistant:/config
      - /etc/domum-core/secrets/home-assistant/secrets.yaml:/config/secrets.yaml:ro
      - /etc/localtime:/etc/localtime:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=domum-proxy
      - traefik.http.routers.ha.rule=Host(`ha.${DOMUM_DOMAIN}`)
      - traefik.http.routers.ha.entrypoints=websecure
      - traefik.http.routers.ha.tls=true
      - traefik.http.routers.ha.tls.certresolver=cf
      - traefik.http.routers.ha.middlewares=securityHeaders@file,forwardedHeaders@file
      - traefik.http.services.ha.loadbalancer.server.port=8123
      - traefik.http.services.ha.loadbalancer.server.scheme=http
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - mariadb
    profiles:
      - core

networks:
  domum-proxy:
    external: true
  domum-data:
    name: domum-data
    driver: bridge
