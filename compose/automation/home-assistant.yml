services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    network_mode: host
    privileged: true
    environment:
      - TZ=America/New_York
    volumes:
      - homeassistant-config:/config
      - /etc/localtime:/etc/localtime:ro
    l    labels:
      - traefik.enable=true
      - traefik.http.routers.ha.rule=Host(`ha.${DOMUM_DOMAIN}`)
      - traefik.http.routers.ha.entrypoints=websecure
      - traefik.http.routers.ha.tls=true
      - traefik.http.routers.ha.tls.certresolver=cf
      - traefik.http.routers.ha.middlewares=securityHeaders@file

      - traefik.http.services.ha.loadbalancer.server.url=http://host.docker.internal:8123
    profiles:
      - core
