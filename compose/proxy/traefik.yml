services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped

    networks:
      - domum-proxy

    ports:
      - "80:80"
      - "443:443"

    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
      - DOMUM_DOMAIN=${DOMUM_DOMAIN}
      - DOMUM_LAN_IP=${DOMUM_LAN_IP}
      - DOMUM_EMAIL=jfranco.lopez@outlook.com

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-letsencrypt:/letsencrypt
      - /opt/domum-core/compose/proxy/traefik:/etc/traefik:ro
      - /etc/domum-core/secrets/traefik_dashboard_users:/etc/traefik/usersfile:ro

    command:
      - --api.dashboard=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --providers.docker=true
      - --providers.docker.endpoint=unix:///var/run/docker.sock
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --log.level=INFO

    extra_hosts:
      - "host.docker.internal:host-gateway"

    profiles:
      - core

volumes:
  traefik-letsencrypt:

networks:
  domum-proxy:
    external: true
