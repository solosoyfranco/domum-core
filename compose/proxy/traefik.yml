services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    networks:
      - domum-proxy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
      - DOMUM_DOMAIN=${DOMUM_DOMAIN}
      - DOMUM_LAN_IP=${DOMUM_LAN_IP}
      - DOMUM_EMAIL=jfranco.lopez@outlook.com
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-letsencrypt:/letsencrypt
      - /opt/domum-core/compose/proxy/traefik:/etc/traefik:ro
      - /etc/domum-core/secrets/traefik_dashboard_users:/etc/traefik/usersfile:ro

    command:
      - --api.dashboard=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443

      - --providers.docker=true
      - --providers.docker.endpoint=unix:///var/run/docker.sock
      - --providers.docker.exposedbydefault=false

      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true

      - --certificatesresolvers.cf.acme.email=jfranco.lopez@outlook.com
      - --certificatesresolvers.cf.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.cf.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.cf.acme.dnschallenge.delaybeforecheck=0

      - --log.level=INFO

    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik.rule=Host(`traefik.${DOMUM_DOMAIN}`)
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.routers.traefik.tls=true
      - traefik.http.routers.traefik.tls.certresolver=cf
      - traefik.http.middlewares.traefik-auth.basicauth.usersfile=/etc/traefik/usersfile
      - traefik.http.routers.traefik.middlewares=traefik-auth

    profiles:
      - core

volumes:
  traefik-letsencrypt:

networks:
  domum-proxy:
    external: true
