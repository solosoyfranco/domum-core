http:
  routers:
    traefik-dashboard:
      rule: "Host(`traefik.ladomum.com`)"
      entryPoints:
        - websecure
      service: api@internal
      middlewares:
        - traefik-auth
      tls:
        certResolver: cf

  middlewares:
    traefik-auth:
      basicAuth:
        usersFile: /etc/traefik/usersfile
