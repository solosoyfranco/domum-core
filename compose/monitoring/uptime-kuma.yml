services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    networks:
      - domum-proxy
    volumes:
      - uptime-kuma-data:/app/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.status.rule=Host(`status.${DOMUM_DOMAIN}`)
      - traefik.http.routers.status.entrypoints=websecure
      - traefik.http.routers.status.tls=true
      - traefik.http.routers.status.tls.certresolver=cf
      - traefik.http.services.status.loadbalancer.server.port=3001
      - traefik.http.routers.status.middlewares=securityHeaders@file
    profiles:
      - core

networks:
  domum-proxy:
    external: true
