services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    networks:
      - domum-proxy
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
      # Add your media mounts, example:
      # - /mnt/media:/media:ro
    devices: []
    labels:
      - traefik.enable=true
      - traefik.http.routers.jellyfin.rule=Host(`jellyfin.${DOMUM_DOMAIN}`)
      - traefik.http.routers.jellyfin.entrypoints=websecure
      - traefik.http.routers.jellyfin.tls=true
      - traefik.http.routers.jellyfin.tls.certresolver=cf
      - traefik.http.services.jellyfin.loadbalancer.server.port=8096
      - traefik.http.routers.jellyfin.middlewares=securityHeaders@file
    profiles:
      - media
      - night

networks:
  domum-proxy:
    external: true
