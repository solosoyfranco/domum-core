services:
  tailscale:
    image: tailscale/tailscale:stable
    container_name: tailscale
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      # Put an auth key in /opt/domum-core/secrets/tailscale_authkey or export TS_AUTHKEY
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ${DOMUM_DIR:-/opt/domum-core}/data/tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    profiles:
      - core
